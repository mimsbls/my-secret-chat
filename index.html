<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Group</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-header { background: #0088cc; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px 15px; border-radius: 10px; max-width: 80%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .msg b { color: #0088cc; display: block; font-size: 13px; margin-bottom: 4px; }
        .msg img, .msg video { width: 100%; border-radius: 8px; margin-top: 5px; max-height: 300px; object-fit: cover; }
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; font-weight: bold; min-width: 45px; }
        .file-btn { background: #54656f; font-size: 20px; border-radius: 50%; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="chat-header">Public Anonymous Group</div>
<div id="messages"></div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Type a message anonymously...">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        storageBucket: "lets-reveal-8602d.firebasestorage.app",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Random Identity
    const myName = "Anon-" + Math.floor(Math.random() * 10000);

    // Messages Live dikhana
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            let content = `<div class="msg"><b>${data.user}</b>${data.text || ""}`;
            if(data.fileUrl) {
                content += `<img src="${data.fileUrl}">`;
            }
            content += `</div>`;
            msgBox.innerHTML += content;
        });
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    // Naya Photo + Message Bhejne ka function
    async function sendMessage() {
        const textInput = document.getElementById('msgText');
        const fileInput = document.getElementById('fileInput');
        const sendBtn = document.getElementById('sendBtn');
        const file = fileInput.files[0];
        let fileUrl = "";

        if(!textInput.value && !file) return;

        // --- LOADING START ---
        sendBtn.disabled = true;
        sendBtn.innerText = "⏳";

        try {
            // Photo upload logic (Imgbb)
            if(file) {
                let formData = new FormData();
                formData.append("image", file);
                const apiKey = "16a0ea2b07218caafa04e2ac8dffbe1c"; 
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if(result.success) {
                    fileUrl = result.data.url; 
                }
            }

            // Firestore mein save karna
            await db.collection("messages").add({
                user: myName,
                text: textInput.value,
                fileUrl: fileUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Input saaf karna
            textInput.value = "";
            fileInput.value = "";
            
        } catch (err) {
            alert("Kuch gadbad ho gayi!");
            console.error(err);
        } finally {
            // --- LOADING END ---
            sendBtn.disabled = false;
            sendBtn.innerText = "➤";
        }
    }
</script>
</body>
</html>
