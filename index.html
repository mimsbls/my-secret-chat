<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Reveal</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-shrink: 0; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; padding-bottom: 20px; }
        
        .msg { background: white; padding: 10px 14px; border-radius: 10px; max-width: 85%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; align-self: flex-start; position: relative; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; display: block; font-size: 12px; margin-bottom: 4px; }
        
        .msg img, .msg video { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 350px; display: block; cursor: pointer; object-fit: cover; }
        
        #input-area { background: #f0f2f5; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ccc; flex-shrink: 0; }
        
        input[type="text"] { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 15px; background: white; }
        
        .btn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; color: white; flex-shrink: 0; }
        #sendBtn { background: #075e54; width: 45px; height: 45px; }
        .file-btn { background: #54656f; width: 40px; height: 40px; font-size: 20px; }
        
        #upload-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="chat-header">Let's Reveal</div>

<div id="messages"></div>

<div id="upload-overlay">
    <div class="loader"></div>
    <div id="percentText">Uploading... 0%</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
    <button class="btn file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Write a message..." autocomplete="off">
    <button id="sendBtn" class="btn" onclick="sendMessage()">➤</button>
</div>

<!-- Notification Sound -->
<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        storageBucket: "lets-reveal-8602d.firebasestorage.app",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();
    
    // Generate Session Identity
    const myName = "Anon-" + Math.floor(Math.random() * 10000);
    let isInitialLoad = true;

    // Login quietly to allow storage access
    auth.signInAnonymously().catch(e => console.error("Auth failed"));

    // Ask for notification permission
    if (Notification.permission === "default") {
        Notification.requestPermission();
    }

    // LIVE MESSAGE LISTENER - REFRESH KI ZAROORAT NAHI
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                const isMe = data.user === myName;
                
                let content = `<div class="msg ${isMe ? 'me' : ''}"><b>${data.user}</b>${data.text || ""}`;
                
                if (data.fileUrl) {
                    if (data.fileType && data.fileType.includes('video')) {
                        content += `<video src="${data.fileUrl}" controls playsinline preload="metadata"></video>`;
                    } else {
                        content += `<img src="${data.fileUrl}" loading="lazy" onclick="window.open('${data.fileUrl}')">`;
                    }
                }
                content += `</div>`;
                
                msgBox.insertAdjacentHTML('beforeend', content);
                msgBox.scrollTop = msgBox.scrollHeight;

                // Play Sound and Notify if not me
                if (!isInitialLoad && !isMe) {
                    document.getElementById('notifSound').play().catch(() => {});
                    if (Notification.permission === "granted") {
                        new Notification("Let's Reveal", { body: `New message from ${data.user}` });
                    }
                }
            }
        });
        isInitialLoad = false;
    });

    // SEND MESSAGE FUNCTION
    async function sendMessage() {
        const textInput = document.getElementById('msgText');
        const fileInput = document.getElementById('fileInput');
        const overlay = document.getElementById('upload-overlay');
        const percentText = document.getElementById('percentText');
        
        const text = textInput.value.trim();
        const file = fileInput.files[0];
        
        if(!text && !file) return;

        textInput.disabled = true;
        let fileUrl = "";
        let fileType = "";

        try {
            if(file) {
                overlay.style.display = "flex";
                fileType = file.type;
                const ref = storage.ref('chat_files/' + Date.now() + "_" + Math.random().toString(36).substring(7));
                const task = ref.put(file);

                await new Promise((resolve, reject) => {
                    task.on('state_changed', 
                        (s) => {
                            const p = Math.round((s.bytesTransferred / s.totalBytes) * 100);
                            percentText.innerText = `Uploading... ${p}%`;
                        },
                        (e) => reject(e),
                        async () => {
                            fileUrl = await task.snapshot.ref.getDownloadURL();
                            resolve();
                        }
                    );
                });
            }

            await db.collection("messages").add({
                user: myName,
                text: text,
                fileUrl: fileUrl,
                fileType: fileType,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            textInput.value = "";
            fileInput.value = "";
            
        } catch (err) {
            console.error(err);
            alert("Error: Check Firebase Settings!");
        } finally {
            textInput.disabled = false;
            overlay.style.display = "none";
            textInput.focus();
        }
    }

    document.getElementById('msgText').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
