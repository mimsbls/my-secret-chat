<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Group Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-header { background: #0088cc; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px 15px; border-radius: 10px; max-width: 80%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .msg b { color: #0088cc; display: block; font-size: 13px; margin-bottom: 4px; }
        .msg img, .msg video { width: 100%; border-radius: 8px; margin-top: 5px; max-height: 300px; object-fit: cover; }
        
        /* Progress Circle Style */
        #upload-status { display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 10px; margin: 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        input:disabled { background: #e0e0e0; cursor: not-allowed; }
        button { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; font-weight: bold; min-width: 45px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .file-btn { background: #54656f; font-size: 20px; }
    </style>
</head>
<body>

<div id="chat-header">Public Anonymous Group</div>
<div id="messages"></div>

<div id="upload-status">
    <div class="loader"></div>
    <div id="percentText" style="font-weight: bold; color: #0088cc; margin-top: 5px;">Uploading 0%</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
    <button id="fileBtn" class="file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Type a message anonymously...">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        storageBucket: "lets-reveal-8602d.firebasestorage.app",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const myName = "Anon-" + Math.floor(Math.random() * 10000);

    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            let content = `<div class="msg"><b>${data.user}</b>${data.text || ""}`;
            if(data.fileUrl) {
                content += `<img src="${data.fileUrl}">`;
            }
            content += `</div>`;
            msgBox.innerHTML += content;
        });
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    async function sendMessage() {
        const textInput = document.getElementById('msgText');
        const fileInput = document.getElementById('fileInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const statusDiv = document.getElementById('upload-status');
        const percentText = document.getElementById('percentText');
        
        const file = fileInput.files[0];
        let fileUrl = "";

        if(!textInput.value && !file) return;

        // --- LOCK INPUTS & SHOW LOADER ---
        textInput.disabled = true;
        sendBtn.disabled = true;
        fileBtn.disabled = true;
        statusDiv.style.display = "flex";
        percentText.innerText = "Connecting...";

        try {
            if(file) {
                let formData = new FormData();
                formData.append("image", file);
                
                // Imgbb upload with manual progress simulation
                percentText.innerText = "Uploading to ImgBB...";
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=16a0ea2b07218caafa04e2ac8dffbe1c`, {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();
                if(result.success) {
                    fileUrl = result.data.url;
                    percentText.innerText = "100% Uploaded!";
                }
            }

            await db.collection("messages").add({
                user: myName,
                text: textInput.value,
                fileUrl: fileUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            textInput.value = "";
            fileInput.value = "";
            
        } catch (err) {
            alert("Upload Fail!");
        } finally {
            // --- UNLOCK EVERYTHING ---
            textInput.disabled = false;
            sendBtn.disabled = false;
            fileBtn.disabled = false;
            statusDiv.style.display = "none";
        }
    }
</script>
</body>
</html>
