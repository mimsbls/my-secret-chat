<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Reveal</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1001; }
        
        /* Extra padding-bottom taaki keyboard ke piche msg na chhipe */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; padding-bottom: 150px; scroll-behavior: smooth; }
        
        .msg { background: white; padding: 10px 14px; border-radius: 10px; max-width: 85%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; display: block; font-size: 11px; margin-bottom: 4px; }
        .msg img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 300px; display: block; object-fit: cover; }
        
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ccc; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        
        input[type="text"] { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 16px; background: white; }
        
        .btn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        #sendBtn { background: #075e54; width: 45px; height: 45px; font-size: 20px; }
        .file-btn { background: #54656f; width: 40px; height: 40px; font-size: 22px; }
        
        #upload-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="chat-header">Let's Reveal</div>
<div id="messages"></div>

<div id="upload-overlay">
    <div class="loader"></div>
    <div id="statusText">Uploading Photo...</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*">
    <button class="btn file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Write a message..." autocomplete="off">
    <button id="sendBtn" class="btn" onclick="sendMessage()">➤</button>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const myName = "Anon-" + Math.floor(Math.random() * 10000);
    
    // Nayi API Key update kar di gayi hai
    const imgbbKey = "16a0ea2b07218caafa04e2ac8dffbe1c"; 
    
    let isInitialLoad = true;

    firebase.auth().signInAnonymously().catch(e => console.log(e));

    // User touch par sound aur notif unlock karna
    document.addEventListener('touchstart', function unlock() {
        const audio = document.getElementById('notifSound');
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
        if (Notification.permission === "default") Notification.requestPermission();
        document.removeEventListener('touchstart', unlock);
    }, { passive: false });

    // Live Messages Listener
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                const isMe = data.user === myName;
                
                let html = `<div class="msg ${isMe ? 'me' : ''}"><b>${data.user}</b>${data.text || ""}`;
                if (data.fileUrl) {
                    html += `<img src="${data.fileUrl}" onclick="window.open('${data.fileUrl}')">`;
                }
                html += `</div>`;
                
                msgBox.insertAdjacentHTML('beforeend', html);
                msgBox.scrollTop = msgBox.scrollHeight;

                if (!isInitialLoad && !isMe) {
                    document.getElementById('notifSound').play().catch(()=>{});
                    if (document.hidden && Notification.permission === "granted") {
                        new Notification("Let's Reveal", { body: `${data.user}: ${data.text || 'Photo bheji hai'}` });
                    }
                }
            }
        });
        isInitialLoad = false;
    });

    // ImgBB Upload Function (Standard XHR for stability)
    function uploadImage(file) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const formData = new FormData();
            formData.append("image", file);
            
            xhr.open("POST", `https://api.imgbb.com/1/upload?key=${imgbbKey}`);
            xhr.onload = () => {
                try {
                    const res = JSON.parse(xhr.responseText);
                    if (res.success) resolve(res.data.url);
                    else reject("API Error: " + res.error.message);
                } catch(e) { reject("Parse Error"); }
            };
            xhr.onerror = () => reject("Network Error");
            xhr.send(formData);
        });
    }

    async function sendMessage() {
        const textIn = document.getElementById('msgText');
        const fileIn = document.getElementById('fileInput');
        const overlay = document.getElementById('upload-overlay');
        
        const messageText = textIn.value.trim();
        const file = fileIn.files[0];
        
        if (!messageText && !file) return;

        textIn.disabled = true;
        let url = "";

        try {
            if (file) {
                overlay.style.display = "flex";
                url = await uploadImage(file);
                overlay.style.display = "none";
            }

            await db.collection("messages").add({
                user: myName,
                text: messageText,
                fileUrl: url,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            textIn.value = "";
            fileIn.value = "";
        } catch (e) {
            console.error(e);
            alert("Upload fail ho gaya! API Key ya Internet check karein.");
            overlay.style.display = "none";
        } finally {
            textIn.disabled = false;
            textIn.focus();
        }
    }

    document.getElementById('msgText').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Keyboard khulne par scroll fix (Visual Viewport API)
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const msgBox = document.getElementById('messages');
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }
</script>
</body>
</html>
