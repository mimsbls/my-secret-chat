<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Secure Group</title>
    <!-- Firebase SDK (Firestore only) -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .msg { background: white; padding: 10px; border-radius: 8px; max-width: 85%; width: fit-content; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg b { color: #075e54; display: block; font-size: 12px; margin-bottom: 4px; }
        .msg img, .msg video { width: 100%; border-radius: 5px; margin-top: 5px; max-height: 300px; }
        
        #upload-status { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 100; text-align: center; }
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
        .file-btn { background: #54656f; font-size: 20px; }

        /* Notification Prompt */
        #notif-banner { background: #fff3cd; color: #856404; padding: 10px; text-align: center; font-size: 13px; display: none; border-bottom: 1px solid #ffeeba; }
        #notif-banner button { background: #856404; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; height: auto; width: auto; margin-left: 10px; }
    </style>
</head>
<body>

<div id="notif-banner">
    Enable notifications to stay live with friends! 
    <button onclick="requestNotifPermission()">Allow Notifications</button>
</div>

<div id="chat-header">
    <span>Anonymous Secure Freedom</span>
</div>

<div id="messages"></div>

<div id="upload-status">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #075e54; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
    <div id="statusText">Uploading File...</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Type a message...">
    <button onclick="sendMessage()">➤</button>
</div>

<!-- Notification Sound (Short beep) -->
<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        storageBucket: "lets-reveal-8602d.appspot.com",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const myName = "Anon-" + Math.floor(Math.random() * 10000);
    let firstLoad = true;

    // 2. NOTIFICATION LOGIC
    if (Notification.permission === "default") {
        document.getElementById('notif-banner').style.display = "block";
    }

    function requestNotifPermission() {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                document.getElementById('notif-banner').style.display = "none";
            }
        });
    }

    function showBrowserNotification(sender, text, isFile) {
        if (Notification.permission === "granted" && sender !== myName) {
            const title = `New message from ${sender}`;
            const body = isFile ? "Sent a file (Photo/Video)" : text;
            
            new Notification(title, {
                body: body,
                icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
            });
            
            // Play sound
            document.getElementById('notifSound').play().catch(e => console.log("Sound play blocked"));
        }
    }

    // 3. LIVE SYNC
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        let newMessages = [];
        
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                newMessages.push(data);
                
                // Trigger notification if not the first initial load
                if (!firstLoad) {
                    showBrowserNotification(data.user, data.text, !!data.fileUrl);
                }
            }
        });

        // Re-render UI
        msgBox.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            let content = `<div class="msg"><b>${data.user}</b>${data.text || ""}`;
            if (data.fileUrl) {
                if (data.fileType && data.fileType.includes('video')) {
                    content += `<video src="${data.fileUrl}" controls playsinline></video>`;
                } else {
                    content += `<img src="${data.fileUrl}" onclick="window.open('${data.fileUrl}')">`;
                }
            }
            content += `</div>`;
            msgBox.innerHTML += content;
        });
        
        msgBox.scrollTop = msgBox.scrollHeight;
        firstLoad = false;
    });

    // 4. SEND FUNCTION
    async function sendMessage() {
        const textInput = document.getElementById('msgText');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('upload-status');
        const file = fileInput.files[0];
        
        if(!textInput.value.trim() && !file) return;

        let fileUrl = "";
        let fileType = "";

        if(file) {
            statusDiv.style.display = "block";
            fileType = file.type;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "ml_default");

            try {
                const res = await fetch("https://api.cloudinary.com/v1_1/demo/auto/upload", {
                    method: "POST",
                    body: formData
                });
                const json = await res.json();
                fileUrl = json.secure_url;
            } catch (err) {
                console.error("Upload failed", err);
                alert("Upload fail ho gaya!");
            }
        }

        await db.collection("messages").add({
            user: myName,
            text: textInput.value,
            fileUrl: fileUrl,
            fileType: fileType,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        textInput.value = "";
        fileInput.value = "";
        statusDiv.style.display = "none";
    }

    const style = document.createElement('style');
    style.innerHTML = "@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }";
    document.head.appendChild(style);
</script>
</body>
</html>
