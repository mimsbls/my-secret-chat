<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Reveal</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; z-index: 100; flex-shrink: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; padding-bottom: 80px; }
        .msg { background: white; padding: 8px 12px; border-radius: 8px; max-width: 80%; width: fit-content; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; display: block; font-size: 11px; margin-bottom: 3px; }
        .msg img { width: 100%; border-radius: 5px; margin-top: 5px; max-height: 300px; display: block; }
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        input[type="text"] { flex: 1; padding: 12px 15px; border: none; border-radius: 20px; outline: none; font-size: 16px; }
        .btn { border: none; border-radius: 50%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #sendBtn { background: #075e54; width: 45px; height: 45px; font-size: 20px; }
        .file-btn { background: #54656f; width: 40px; height: 40px; font-size: 22px; }
        #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; z-index: 1000; text-align: center; }
        .spin { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="chat-header">Let's Reveal</div>
<div id="messages"></div>

<div id="loader">
    <div class="spin"></div>
    <div id="ld-text">Uploading Photo...</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*">
    <button class="btn file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Type message...">
    <button id="sendBtn" class="btn" onclick="sendMessage()">➤</button>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const myName = "Anon-" + Math.floor(Math.random() * 10000);
    const imgbbKey = "8c8b6710b91d7946808778f310f8df92";
    let initial = true;

    // Login
    firebase.auth().signInAnonymously();

    // Sound activation on first touch
    document.body.addEventListener('touchstart', () => {
        const audio = document.getElementById('notifSound');
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
        if (Notification.permission === 'default') Notification.requestPermission();
    }, {once: true});

    // Real-time Sync
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot(snap => {
        const box = document.getElementById('messages');
        snap.docChanges().forEach(change => {
            if (change.type === "added") {
                const d = change.doc.data();
                const isMe = d.user === myName;
                const html = `<div class="msg ${isMe?'me':''}"><b>${d.user}</b>${d.text||''}${d.fileUrl?`<img src="${d.fileUrl}" onclick="window.open('${d.fileUrl}')">`:''}</div>`;
                box.insertAdjacentHTML('beforeend', html);
                box.scrollTop = box.scrollHeight;

                if (!initial && !isMe) {
                    document.getElementById('notifSound').play().catch(()=>{});
                    if (!document.hasFocus() && Notification.permission === "granted") {
                        new Notification("Let's Reveal", { body: `${d.user}: ${d.text || 'Sent a photo'}` });
                    }
                }
            }
        });
        initial = false;
    });

    async function sendMessage() {
        const textIn = document.getElementById('msgText');
        const fileIn = document.getElementById('fileInput');
        const loader = document.getElementById('loader');
        
        if (!textIn.value.trim() && !fileIn.files[0]) return;

        const file = fileIn.files[0];
        let url = "";

        if (file) {
            loader.style.display = "block";
            const fd = new FormData();
            fd.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: fd });
                const json = await res.json();
                url = json.data.url;
            } catch (e) { alert("Upload failed!"); }
            loader.style.display = "none";
        }

        await db.collection("messages").add({
            user: myName,
            text: textIn.value,
            fileUrl: url,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        textIn.value = "";
        fileIn.value = "";
    }

    // Keyboard Fix
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }
</script>
</body>
</html>
