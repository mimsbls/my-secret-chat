<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Reveal</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #d1d7db; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-shrink: 0; z-index: 1001; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; padding-bottom: 100px; scroll-behavior: smooth; }
        
        .msg { background: white; padding: 10px 14px; border-radius: 10px; max-width: 85%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; align-self: flex-start; position: relative; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; display: block; font-size: 11px; margin-bottom: 4px; }
        
        .msg img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 350px; display: block; cursor: pointer; object-fit: cover; }
        
        #input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ccc; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom, 10px); }
        
        input[type="text"] { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 15px; background: white; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        
        .btn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        #sendBtn { background: #075e54; width: 45px; height: 45px; }
        .file-btn { background: #54656f; width: 40px; height: 40px; font-size: 20px; }
        
        #upload-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #bottom-anchor { height: 20px; width: 100%; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="chat-header">Let's Reveal</div>

<div id="messages">
    <div id="bottom-anchor"></div>
</div>

<div id="upload-overlay">
    <div class="loader"></div>
    <div id="statusText">ImgBB par upload ho raha hai...</div>
</div>

<div id="input-area">
    <input type="file" id="fileInput" style="display:none" accept="image/*">
    <button class="btn file-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" id="msgText" placeholder="Write a message..." autocomplete="off">
    <button id="sendBtn" class="btn" onclick="sendMessage()">➤</button>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdVehk5T4jyBurH5s0HLrfwvi-unESMMs",
        authDomain: "lets-reveal-8602d.firebaseapp.com",
        projectId: "lets-reveal-8602d",
        messagingSenderId: "278838819481",
        appId: "1:278838819481:web:c40a20b68991850abed608"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const imgbbKey = "8c8b6710b91d7946808778f310f8df92"; // Aapki ImgBB Key
    
    const myName = "Anon-" + Math.floor(Math.random() * 10000);
    let isInitialLoad = true;

    auth.signInAnonymously().catch(e => console.error("Auth failed", e));

    document.addEventListener('click', () => {
        if (Notification.permission === "default") Notification.requestPermission();
    }, { once: true });

    function triggerNotification(sender, message) {
        if (Notification.permission === "granted" && document.visibilityState !== 'visible') {
            new Notification("Let's Reveal", {
                body: `${sender}: ${message || "Shared a photo"}`,
                tag: 'chat-notif'
            });
        }
        document.getElementById('notifSound').play().catch(() => {});
    }

    // LIVE MESSAGE LISTENER
    db.collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
        const msgBox = document.getElementById('messages');
        const anchor = document.getElementById('bottom-anchor');
        
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                const isMe = data.user === myName;
                
                let content = `<div class="msg ${isMe ? 'me' : ''}"><b>${data.user}</b>${data.text || ""}`;
                if (data.fileUrl) {
                    content += `<img src="${data.fileUrl}" loading="lazy" onclick="window.open('${data.fileUrl}')">`;
                }
                content += `</div>`;
                
                anchor.insertAdjacentHTML('beforebegin', content);
                
                setTimeout(() => {
                    msgBox.scrollTop = msgBox.scrollHeight;
                }, 100);

                if (!isInitialLoad && !isMe) {
                    triggerNotification(data.user, data.text);
                }
            }
        });
        isInitialLoad = false;
    });

    // UPLOAD TO IMGBB FUNCTION
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
            method: "POST",
            body: formData
        });
        
        const result = await response.json();
        if (result.success) {
            return result.data.url;
        } else {
            throw new Error("ImgBB Upload Failed");
        }
    }

    async function sendMessage() {
        const textInput = document.getElementById('msgText');
        const fileInput = document.getElementById('fileInput');
        const overlay = document.getElementById('upload-overlay');
        
        const text = textInput.value.trim();
        const file = fileInput.files[0];
        
        if(!text && !file) return;

        textInput.disabled = true;
        let fileUrl = "";

        try {
            if(file) {
                overlay.style.display = "flex";
                fileUrl = await uploadToImgBB(file);
            }

            await db.collection("messages").add({
                user: myName,
                text: text,
                fileUrl: fileUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            textInput.value = "";
            fileInput.value = "";
        } catch (err) {
            console.error(err);
            alert("Kuch gadbad hui! Photo upload nahi ho payi.");
        } finally {
            textInput.disabled = false;
            overlay.style.display = "none";
            textInput.focus();
        }
    }

    document.getElementById('msgText').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Keyboard adjustment for mobile
    window.visualViewport.addEventListener('resize', () => {
        const msgBox = document.getElementById('messages');
        msgBox.scrollTop = msgBox.scrollHeight;
    });
</script>
</body>
</html>
